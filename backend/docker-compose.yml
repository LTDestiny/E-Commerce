version: "3.9"

services:
  # ==========================================
  # Infrastructure
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ==========================================
  # API Gateway
  # ==========================================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - ORDER_SERVICE_URL=http://order-service:4001
      - PAYMENT_SERVICE_URL=http://payment-service:4002
      - INVENTORY_SERVICE_URL=http://inventory-service:4003
      - SHIPPING_SERVICE_URL=http://shipping-service:4004
      - NOTIFICATION_SERVICE_URL=http://notification-service:4005
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ==========================================
  # Microservices
  # ==========================================
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: ecommerce-order-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/order_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: ecommerce-payment-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/payment_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: ecommerce-inventory-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/inventory_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  shipping-service:
    build:
      context: .
      dockerfile: shipping-service/Dockerfile
    container_name: ecommerce-shipping-service
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/shipping_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: ecommerce-notification-service
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/notification_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  redis-data:
  postgres-data:
