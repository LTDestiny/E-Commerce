limit_req_zone $binary_remote_addr zone=web_per_ip:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
  listen 80;
  server_name _;

  limit_conn conn_per_ip 30;

  # Proxy API requests to API Gateway
  location /api/ {
    limit_req zone=api_per_ip burst=30 nodelay;
    proxy_pass http://api-gateway:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_set_header Connection "";
  }

  # Proxy all other requests to the frontend (Next.js dev server)
  location / {
    limit_req zone=web_per_ip burst=60 nodelay;
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
  }
}
